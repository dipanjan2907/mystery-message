services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
      - MONGO_URI=${MONGO_URI}
      - RESEND_API_KEY=${RESEND_API_KEY}
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET}
      - GROQ_API_KEY=${GROQ_API_KEY}
    networks:
      - mystertMessage
    restart: always

networks:
  mystertMessage:
    driver: bridge
